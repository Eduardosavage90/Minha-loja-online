<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja Online</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial; background: #f5f5f5; }
        .header { background: #2c3e50; color: white; padding: 15px; text-align: center; }
        .nav { background: #34495e; padding: 10px; text-align: center; }
        .nav a { color: white; text-decoration: none; margin: 0 15px; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .produtos { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin: 20px 0; }
        .produto { background: white; padding: 15px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .produto img { max-width: 100%; height: 150px; object-fit: cover; border-radius: 5px; }
        .preco { color: #e74c3c; font-size: 1.2em; font-weight: bold; margin: 10px 0; }
        .btn { background: #3498db; color: white; border: none; padding: 10px 15px; border-radius: 3px; cursor: pointer; margin: 5px; }
        .btn:hover { background: #2980b9; }
        .btn-carrinho { background: #27ae60; }
        .carrinho { background: white; padding: 20px; border-radius: 5px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-top: 20px; }
        .carrinho-item { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .total { font-size: 1.2em; font-weight: bold; text-align: right; margin-top: 15px; }
        .categorias { display: flex; gap: 10px; margin: 15px 0; flex-wrap: wrap; }
        .categoria { background: #ecf0f1; padding: 5px 15px; border-radius: 15px; cursor: pointer; }
        .categoria.ativa { background: #3498db; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🛒 Loja Online</h1>
        <p>Compre com segurança e rapidez</p>
    </div>

    <div class="nav">
        <a href="#produtos">Produtos</a>
        <a href="#carrinho">Carrinho (<span id="contador-carrinho">0</span>)</a>
    </div>

    <div class="container">
        <div class="categorias">
            <div class="categoria ativa" onclick="filtrarCategoria('todos')">Todos</div>
            <div class="categoria" onclick="filtrarCategoria('eletronicos')">Eletrônicos</div>
            <div class="categoria" onclick="filtrarCategoria('roupas')">Roupas</div>
            <div class="categoria" onclick="filtrarCategoria('casa')">Casa</div>
        </div>

        <div class="produtos" id="produtos">
            <!-- Produtos serão carregados aqui -->
        </div>

        <div class="carrinho" id="carrinho">
            <h2>🛒 Seu Carrinho</h2>
            <div id="itens-carrinho">
                <p>Carrinho vazio</p>
            </div>
            <div class="total" id="total-carrinho">Total: R$ 0,00</div>
            <button class="btn btn-carrinho" onclick="finalizarCompra()">✅ Finalizar Compra</button>
        </div>
    </div>

    <script>
        // Dados dos produtos
        const produtos = [
            { id: 1, nome: "Smartphone", preco: 899.90, categoria: "eletronicos", img: "📱" },
            { id: 2, nome: "Notebook", preco: 2499.90, categoria: "eletronicos", img: "💻" },
            { id: 3, nome: "Fones Bluetooth", preco: 199.90, categoria: "eletronicos", img: "🎧" },
            { id: 4, nome: "Camiseta Básica", preco: 29.90, categoria: "roupas", img: "👕" },
            { id: 5, nome: "Calça Jeans", preco: 89.90, categoria: "roupas", img: "👖" },
            { id: 6, nome: "Tênis Esportivo", preco: 159.90, categoria: "roupas", img: "👟" },
            { id: 7, nome: "Panela de Pressão", preco: 79.90, categoria: "casa", img: "🍳" },
            { id: 8, nome: "Jogo de Cama", preco: 129.90, categoria: "casa", img: "🛏️" },
            { id: 9, nome: "Luminária LED", preco: 49.90, categoria: "casa", img: "💡" }
        ];

        let carrinho = JSON.parse(localStorage.getItem('carrinho')) || [];
        let categoriaAtiva = 'todos';

        // Inicializar
        carregarProdutos();
        atualizarCarrinho();

        function carregarProdutos() {
            const container = document.getElementById('produtos');
            const produtosFiltrados = categoriaAtiva === 'todos' 
                ? produtos 
                : produtos.filter(p => p.categoria === categoriaAtiva);

            container.innerHTML = produtosFiltrados.map(produto => `
                <div class="produto">
                    <div style="font-size: 60px; margin: 10px 0;">${produto.img}</div>
                    <h3>${produto.nome}</h3>
                    <div class="preco">R$ ${produto.preco.toFixed(2)}</div>
                    <button class="btn btn-carrinho" onclick="adicionarAoCarrinho(${produto.id})">
                        🛒 Adicionar
                    </button>
                </div>
            `).join('');
        }

        function filtrarCategoria(categoria) {
            categoriaAtiva = categoria;
            document.querySelectorAll('.categoria').forEach(cat => cat.classList.remove('ativa'));
            event.target.classList.add('ativa');
            carregarProdutos();
        }

        function adicionarAoCarrinho(id) {
            const produto = produtos.find(p => p.id === id);
            const itemExistente = carrinho.find(item => item.id === id);

            if (itemExistente) {
                itemExistente.quantidade++;
            } else {
                carrinho.push({ ...produto, quantidade: 1 });
            }

            atualizarCarrinho();
            alert(`✅ ${produto.nome} adicionado ao carrinho!`);
        }

        function atualizarCarrinho() {
            const container = document.getElementById('itens-carrinho');
            const totalElement = document.getElementById('total-carrinho');
            const contador = document.getElementById('contador-carrinho');

            if (carrinho.length === 0) {
                container.innerHTML = '<p>Carrinho vazio</p>';
                totalElement.textContent = 'Total: R$ 0,00';
                contador.textContent = '0';
            } else {
                container.innerHTML = carrinho.map(item => `
                    <div class="carrinho-item">
                        <span>${item.nome}</span>
                        <span>
                            R$ ${item.preco.toFixed(2)} 
                            x ${item.quantidade}
                            <button class="btn" style="padding:2px 5px;margin-left:5px;" onclick="removerDoCarrinho(${item.id})">❌</button>
                        </span>
                    </div>
                `).join('');

                const total = carrinho.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
                totalElement.textContent = `Total: R$ ${total.toFixed(2)}`;
                contador.textContent = carrinho.reduce((sum, item) => sum + item.quantidade, 0);
            }

            localStorage.setItem('carrinho', JSON.stringify(carrinho));
        }

        function removerDoCarrinho(id) {
            carrinho = carrinho.filter(item => item.id !== id);
            atualizarCarrinho();
        }

        function finalizarCompra() {
            if (carrinho.length === 0) {
                alert('🛒 Carrinho vazio! Adicione produtos antes de finalizar.');
                return;
            }

            const total = carrinho.reduce((sum, item) => sum + (item.preco * item.quantidade), 0);
            const itens = carrinho.map(item => `${item.nome} (${item.quantidade}x)`).join('\n');

            const resumo = `🛍️ RESUMO DA COMPRA\n\nItens:\n${itens}\n\nTotal: R$ ${total.toFixed(2)}\n\nObrigado pela compra!`;

            // Criar e baixar comprovante
            const element = document.createElement('a');
            element.setAttribute('href', 'data:text/plain;charset=utf-8,' + encodeURIComponent(resumo));
            element.setAttribute('download', `compra-${Date.now()}.txt`);
            element.style.display = 'none';
            
            document.body.appendChild(element);
            element.click();
            document.body.removeChild(element);

            // Limpar carrinho
            carrinho = [];
            atualizarCarrinho();

            alert('✅ Compra finalizada! Comprovante baixado.');
        }
    </script>
</body>
</html>
